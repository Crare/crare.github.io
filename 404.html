<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA routing workaround
      // Redirect all 404s to index.html with the original path preserved
      const path = window.location.pathname
        .split('/')
        .slice(1)
        .join('/');
      window.location.replace('/?redirect=' + encodeURIComponent('/' + path + window.location.search));
    </script>
  </head>
  <body />
</html>
